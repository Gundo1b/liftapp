<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/styles/login.css">
    <title>login</title>
</head>
<body class="auth-screen">
    <div class="auth-container">
        <h2>Login</h2>
        <input type="email" placeholder="Email" class="auth-input" required>

        <div class="password-wrapper">
            <input id="login-password" type="password" placeholder="Password" class="auth-input" required>
            <i class="bi bi-eye-slash toggle-password" id="login-toggle" onclick="togglePassword('login-password','login-toggle')"></i>     
        </div>
        <button class="auth-btn" onclick="window.location.href='/pages/dashboard.html'">Login</button>

        <p class="auth-text">Don't have an account? <a href="/pages/aouth/register.html">Register</a></p>
    </div>
    <script src="../../js/auth.js"></script>
</body>
</html>
