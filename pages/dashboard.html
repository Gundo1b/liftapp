<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="/styles/dashboard.css">
  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
    <title>dashboard</title>
</head>
<body class="dashboard-screen">
    <!-- on top -->
     <header class="top-bar">
        <div class="logo">
            <img src="/assets/undraw_my-current-location_tudq.png" alt="Logo" class="logo-img">        </div>
        <div class="search-box">
            <input type="text" placeholder="where-To" class="search-input">
            
        </div>
        <button class="search-btn">
            <i class="bi bi-search"></i>
            
        </button>
     </header>

     <div id="map"></div>

     <!-- ✅ AVAILABLE TRIPS SECTION -->
<section class="available-trips">
  <h3>Available Trips</h3>

  <div class="trip-card">
    <div class="trip-info">
      <strong>From:</strong> Sandton<br />
      <strong>To:</strong> Pretoria<br />
      <strong>Time:</strong> 12:30 PM
    </div>
    <button class="book-btn">Book</button>
  </div>

  <div class="trip-card">
    <div class="trip-info">
      <strong>From:</strong> Midrand<br />
      <strong>To:</strong> Johannesburg<br />
      <strong>Time:</strong> 1:15 PM
    </div>
    <button class="book-btn">Book</button>
  </div>
</section>






     <!-- bottom nav -->
<nav class="bottom-tabs">
    <a href="" class="tab-item">
        <i class="bi bi-house"></i>
        <span class="tab-label">Home</span>
    </a>
    <a href="" class="tab-item">
        <i class="bi bi-arrow-90deg-up"></i>
        <span class="tab-label">Trip</span>
    </a>
    <a href="" class="tab-item">
        <i class="bi bi-chat"></i>
        <span class="tab-label">Chat</span>
    </a>
    <a href="" class="tab-item">
        <i class="bi bi-gear"></i>
        <span class="tab-label">Settings</span>
    </a>
</nav>

    <script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
