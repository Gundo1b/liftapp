<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Your Custom CSS -->
  <link rel="stylesheet" href="/styles/dashboard.css" />

  <title>Dashboard</title>

  <style>
    .user-menu {
      position: relative;
    }
    .user-dropdown {
      position: absolute;
      top: 40px;
      right: 0;
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px;
      display: none;
      width: 200px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      z-index: 999;
    }
    .user-dropdown p {
      margin: 5px 0;
      font-size: 14px;
    }
    .user-dropdown button {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 8px 10px;
      width: 100%;
      border-radius: 4px;
      cursor: pointer;
    }
    .user-dropdown button:hover {
      background-color: #c82333;
    }
  </style>
</head>
<body class="dashboard-screen">
  <header class="top-bar">
    <div class="logo">
      <img src="/assets/undraw_my-current-location_tudq.png" alt="Logo" />
    </div>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search & Add Stop..." />
      <ul id="search-results" class="search-results"></ul>
    </div>

    <!-- User Button + Dropdown -->
    <div class="user-menu">
      <button class="search-btn" onclick="toggleUserMenu()">
        <i class="bi bi-person-circle"></i>
      </button>
      <div id="user-dropdown" class="user-dropdown">
        <p><strong>Name:</strong> John Doe</p>
        <p><strong>Email:</strong> johndoe@example.com</p>
        <button onclick="logoutUser()">Logout</button>
      </div>
    </div>
  </header>

  <div id="map"></div>

  <!-- Available trips section -->
  <section class="available-trips">
    <h3>Available Trips</h3>
    <div class="trip-card">
      <div class="trip-info">
        <strong>From:</strong> Sandton<br />
        <strong>To:</strong> Pretoria<br />
        <strong>Time:</strong> 12:30 PM
      </div>
      <button class="book-btn">Book</button>
    </div>
    <div class="trip-card">
      <div class="trip-info">
        <strong>From:</strong> Midrand<br />
        <strong>To:</strong> Johannesburg<br />
        <strong>Time:</strong> 1:15 PM
      </div>
      <button class="book-btn">Book</button>
    </div>
  </section>

  <nav class="bottom-tabs">
    <a href="#" class="tab-item">
      <i class="bi bi-house"></i>
      <span class="tab-label">Home</span>
    </a>
    <a href="#" class="tab-item">
      <i class="bi bi-arrow-90deg-up"></i>
      <span class="tab-label">Trip</span>
    </a>
    <a href="#" class="tab-item">
      <i class="bi bi-chat"></i>
      <span class="tab-label">Chat</span>
    </a>
    <a href="#" class="tab-item">
      <i class="bi bi-gear"></i>
      <span class="tab-label">Settings</span>
    </a>
  </nav>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Routing Machine -->
  <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

  <!-- Firebase Auth Guard -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyADLB06k2VYNAmtg3Kqp5y-qvSOm2BkDr8",
      authDomain: "liftapp-d8aee.firebaseapp.com",
      projectId: "liftapp-d8aee",
      storageBucket: "liftapp-d8aee.appspot.com",
      messagingSenderId: "804473144663",
      appId: "1:804473144663:web:2b2dca35afb6006775aa12"
    };
    firebase.initializeApp(firebaseConfig);

    firebase.auth().onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "/pages/aouth/login.html";
      } else {
        // Update name & email
        document.querySelector("#user-dropdown").innerHTML = `
          <p><strong>Name:</strong> ${user.displayName || "Anonymous"}</p>
          <p><strong>Email:</strong> ${user.email}</p>
          <button onclick="logoutUser()">Logout</button>
        `;
      }
    });

    function logoutUser() {
      firebase.auth().signOut().then(() => {
        window.location.href = "/pages/aouth/login.html";
      });
    }

    function toggleUserMenu() {
      const dropdown = document.getElementById("user-dropdown");
      dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
    }

    // Close dropdown if clicked outside
    document.addEventListener("click", (event) => {
      const menu = document.querySelector(".user-menu");
      if (!menu.contains(event.target)) {
        document.getElementById("user-dropdown").style.display = "none";
      }
    });
  </script>

  <!-- Your dashboard script -->
  <script src="/js/dashboard.js"></script>
</body>
</html>
